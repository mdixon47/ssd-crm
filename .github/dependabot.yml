version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      nuxt:
        patterns:
          - 'nuxt'
          - '@nuxt/*'
          - '@nuxtjs/*'
          - 'nitropack'
      vue:
        patterns:
          - 'vue'
          - 'vue-*'
          - '@vue/*'
          - 'pinia'
          - '@pinia/*'
      ai-stack:
        patterns:
          - '@anthropic-ai/*'
          - '@modelcontextprotocol/*'
      supabase:
        patterns:
          - '@supabase/*'
          - '@nuxtjs/supabase'
      dev-tooling:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'eslint'
          - 'eslint-*'
          - '@nuxt/eslint'
        # Group only minor + patch. Majors arrive as individual PRs so each
        # can be evaluated for breaking changes (peer-dep coordination,
        # vue-tsc support, engines range, etc). See docs/issues.md #18.
        update-types:
          - minor
          - patch
    ignore:
      # Major Nuxt upgrades are coordinated manually
      - dependency-name: 'nuxt'
        update-types: ['version-update:semver-major']
      # @types/node major must track the engines range (package.json: node
      # >=22 <25 → Node 24 types). Bump manually when the Node range moves.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
