version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      nuxt:
        patterns:
          - 'nuxt'
          - '@nuxt/*'
          - '@nuxtjs/*'
          - 'nitropack'
      vue:
        patterns:
          - 'vue'
          - 'vue-*'
          - '@vue/*'
          - 'pinia'
          - '@pinia/*'
      ai-stack:
        patterns:
          - '@anthropic-ai/*'
          - '@modelcontextprotocol/*'
      supabase:
        patterns:
          - '@supabase/*'
          - '@nuxtjs/supabase'
      dev-tooling:
        patterns:
          - 'typescript'
          - '@types/*'
          - 'eslint'
          - 'eslint-*'
          - '@nuxt/eslint'
    ignore:
      # Major Nuxt upgrades are coordinated manually
      - dependency-name: 'nuxt'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
