name: Publish Scheduled Content

on:
  schedule:
    # Runs every 15 minutes. GitHub Actions minimum is 5 minutes.
    - cron: '*/15 * * * *'
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  publish:
    name: Trigger scheduled publish
    runs-on: ubuntu-latest
    steps:
      - name: Call publish-scheduled endpoint
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/publish-scheduled" \
            -H "Authorization: Bearer ${{ secrets.NUXT_CRON_SECRET }}")
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Cron endpoint returned $RESPONSE — check APP_URL and NUXT_CRON_SECRET secrets"
            exit 1
          fi
