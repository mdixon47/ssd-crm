name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC re-scan against latest advisories
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action posts a PR comment summary; needs pull-requests: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free open-source license for public repos; for private repos add GITLEAKS_LICENSE
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Requires GitHub Advanced Security for private repos. Marked non-blocking
    # so the rest of the Security workflow can still gate merges. Enable GHAS
    # (Settings → Security → Code security) to make this actionable.
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  npm-audit:
    name: npm audit (high+critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # Workaround for npm/cli#4828: the macOS-generated lockfile only records
      # the darwin-arm64 native binding for oxc-parser, so Linux runners fail
      # to install '@oxc-parser/binding-linux-x64-gnu'. Remove the lockfile so
      # npm install re-resolves and picks the correct platform binding.
      - run: rm -f package-lock.json
      - run: npm install --no-audit --no-fund --ignore-scripts
      # Fail build only on high/critical advisories
      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev
