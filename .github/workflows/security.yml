name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC re-scan against latest advisories
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    # CodeQL upload requires Code scanning to be enabled in the repo
    # (Settings → Code security and analysis → Code scanning). Until that is on
    # the analyze step 403s. Marked non-blocking so the pipeline can be green
    # before the toggle is flipped; remove once Code scanning is enabled.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # gitleaks-action posts a PR comment summary; needs pull-requests: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free open-source license for public repos; for private repos add GITLEAKS_LICENSE
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

  npm-audit:
    name: npm audit (high+critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      # No lockfile in the repo (see docs/issues.md #14b); skip postinstall
      # since `npm audit` only needs the dependency tree, not nuxt prepare.
      - run: npm install --no-audit --no-fund --ignore-scripts
      # Fail build only on high/critical advisories
      - name: Run npm audit
        run: npm audit --audit-level=high --omit=dev
