name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck (non-blocking)
    runs-on: ubuntu-latest
    # Pre-existing type errors across the codebase prevent this from blocking the
    # pipeline. Tracked in docs/issues.md — once cleared, drop `continue-on-error`
    # and re-add `typecheck` to `build.needs` below.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npx nuxt prepare
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - name: Nuxt build
        env:
          # Build-time placeholders so the bundle compiles in CI without real secrets
          ANTHROPIC_API_KEY: "ci-placeholder"
          SUPABASE_URL: "https://ci.placeholder.supabase.co"
          SUPABASE_KEY: "ci-placeholder-anon-key"
          SUPABASE_SERVICE_KEY: "ci-placeholder-service-key"
        run: npm run build
