name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # No lockfile in the repo (see docs/issues.md #14b); npm install
      # resolves fresh on the Linux runner so platform-specific native
      # bindings (oxc-parser) are picked correctly.
      - run: npm install --no-audit --no-fund
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npx nuxt prepare
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - name: Nuxt build
        env:
          # Build-time placeholders so the bundle compiles in CI without real secrets
          ANTHROPIC_API_KEY: "ci-placeholder"
          SUPABASE_URL: "https://ci.placeholder.supabase.co"
          SUPABASE_KEY: "ci-placeholder-anon-key"
          SUPABASE_SERVICE_KEY: "ci-placeholder-service-key"
        run: npm run build
