# Netlify build configuration for the Nuxt 3 / Nitro app.
# Nitro's `netlify` preset emits the SSR function to `.netlify/functions-internal`
# and the static client bundle to `dist`. No `@netlify/plugin-nuxt` required.

[build]
  command = "npx nuxt prepare && npm run build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "22"
  # NPM_VERSION intentionally unset — use the npm bundled with Node 22 (10.x).
  # Same npm version GitHub Actions uses; matches package-lock-less install.
  NPM_FLAGS = "--no-audit --no-fund"
  # macOS-only workaround in dev (see docs/issues.md). Harmless on Linux runners.
  TMPDIR = "/tmp"
  # Raise Node heap limit for large Nuxt/Vite builds (default ~1.5 GB hits OOM on Netlify).
  NODE_OPTIONS = "--max-old-space-size=4096"

# Raise serverless function timeout to the Netlify maximum (26 s).
# AI agent routes (email-strategy, weekly-audit) make multiple LLM calls
# and would hit the 10 s default.
[functions]
  timeout = 26

# Preview deploys (branch + PR) get the same build pipeline as production.
[context.production.environment]
  NITRO_PRESET = "netlify"

[context.deploy-preview.environment]
  NITRO_PRESET = "netlify"

[context.branch-deploy.environment]
  NITRO_PRESET = "netlify"
