# Netlify build configuration for the Nuxt 3 / Nitro app.
# Nitro's `netlify` preset emits the SSR function to `.netlify/functions-internal`
# and the static client bundle to `dist`. No `@netlify/plugin-nuxt` required.

[build]
  command = "npx nuxt prepare && npm run build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "22"
  # NPM_VERSION intentionally unset — use the npm bundled with Node 22 (10.x).
  # Same npm version GitHub Actions uses; matches package-lock-less install.
  NPM_FLAGS = "--no-audit --no-fund"
  # macOS-only workaround in dev (see docs/issues.md). Harmless on Linux runners.
  TMPDIR = "/tmp"
  # Raise Node heap limit for large Nuxt/Vite builds (default ~1.5 GB hits OOM on Netlify).
  NODE_OPTIONS = "--max-old-space-size=4096"
  # GA4_PROPERTY_ID and PROJECT_ID are non-sensitive identifiers (not credentials),
  # but Netlify secrets scanning fails the build if their values appear in the repo
  # or build output (e.g. docs mention the GCP project name `ssdoauthproject`). Omit
  # just these keys; the real creds (GA4_PRIVATE_KEY / GA4_CLIENT_EMAIL / PRIVATE_KEY
  # / CLIENT_EMAIL …) stay scanned. See docs/issues.md #27.
  SECRETS_SCAN_OMIT_KEYS = "GA4_PROPERTY_ID,PROJECT_ID"

# Preview deploys (branch + PR) get the same build pipeline as production.
[context.production.environment]
  NITRO_PRESET = "netlify"

[context.deploy-preview.environment]
  NITRO_PRESET = "netlify"

[context.branch-deploy.environment]
  NITRO_PRESET = "netlify"

# ── Functions ────────────────────────────────────────────────
# Raise the default 10s timeout for AI agent routes.
# timeout must be set per-function, not at the [functions] table level.
[functions]
  included_files = [".netlify/functions-internal/**"]

[functions.server]
  timeout = 26

